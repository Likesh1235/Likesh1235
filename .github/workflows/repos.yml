name: Update Repository Information

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-repositories:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Repository Summary
        run: |
          mkdir -p generated

          cat <<EOF > generated/latest-repos.md
          ## 🚀 Featured Repositories

          - ⭐ Python Practice
          - 🤖 AI Engineering
          - 🧠 Machine Learning
          - ☕ Java Projects
          - 🌱 Spring Boot
          - 📊 Data Science

          EOF

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update repository information"