<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
<defs>
  <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00E5FF">
      <animate attributeName="stop-color" values="#00E5FF;#7C3AED;#00E5FF" dur="6s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#FF4ECD"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="128" height="128" rx="24" fill="#0B1020"/>

<g filter="url(#glow)">
  <rect x="28" y="34" width="72" height="48" rx="8"
        fill="#121A33"
        stroke="url(#grad)"
        stroke-width="2.8">
    <animate attributeName="stroke-width" values="2.8;4;2.8" dur="2.2s" repeatCount="indefinite"/>
  </rect>

  <rect x="44" y="48" width="40" height="20" rx="3"
        fill="none"
        stroke="url(#grad)"
        stroke-width="2"/>

  <line x1="64" y1="20" x2="64" y2="34" stroke="url(#grad)" stroke-width="2"/>
  <circle cx="64" cy="16" r="3.5" fill="#00E5FF">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- GPU pins -->
  <g stroke="url(#grad)" stroke-width="2" stroke-linecap="round">
    <line x1="20" y1="42" x2="28" y2="42"/>
    <line x1="20" y1="54" x2="28" y2="54"/>
    <line x1="20" y1="66" x2="28" y2="66"/>
    <line x1="20" y1="78" x2="28" y2="78"/>

    <line x1="100" y1="42" x2="108" y2="42"/>
    <line x1="100" y1="54" x2="108" y2="54"/>
    <line x1="100" y1="66" x2="108" y2="66"/>
    <line x1="100" y1="78" x2="108" y2="78"/>
  </g>

  <!-- Data flow -->
  <path d="M38 90 C52 82 76 98 90 90"
        fill="none"
        stroke="url(#grad)"
        stroke-width="2">
    <animate attributeName="d"
      values="
      M38 90 C52 82 76 98 90 90;
      M38 90 C52 98 76 82 90 90;
      M38 90 C52 82 76 98 90 90"
      dur="3s"
      repeatCount="indefinite"/>
  </path>
</g>

<text x="64" y="118"
      text-anchor="middle"
      font-family="Arial,sans-serif"
      font-size="10"
      fill="#9CA3AF">GPU</text>

</svg>
