<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
<defs>
  <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00E5FF">
      <animate attributeName="stop-color"
        values="#00E5FF;#7C3AED;#00E5FF"
        dur="6s"
        repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#FF4ECD"/>
  </linearGradient>

  <filter id="glow">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<rect width="128" height="128" rx="24" fill="#0B1020"/>

<g filter="url(#glow)">
  <!-- Leaf -->
  <path d="M64 22
           C88 28 98 52 82 74
           C68 94 46 94 38 74
           C28 50 40 28 64 22Z"
        fill="#121A33"
        stroke="url(#grad)"
        stroke-width="2.8"/>

  <!-- Stem -->
  <path d="M64 32V94"
        fill="none"
        stroke="url(#grad)"
        stroke-width="2.5"
        stroke-linecap="round"/>

  <!-- Veins -->
  <path d="M64 48L48 58
           M64 60L80 52
           M64 72L50 82
           M64 80L78 72"
        fill="none"
        stroke="url(#grad)"
        stroke-width="2"/>

  <!-- Pulse -->
  <circle cx="64" cy="58" r="4" fill="#00E5FF">
    <animate attributeName="r"
      values="3;6;3"
      dur="2s"
      repeatCount="indefinite"/>
  </circle>
</g>

<text x="64" y="118"
      text-anchor="middle"
      font-family="Arial,sans-serif"
      font-size="10"
      fill="#9CA3AF">SPRING</text>

</svg>
