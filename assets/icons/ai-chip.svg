<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
<defs>
<linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#00E5FF">
<animate attributeName="stop-color" values="#00E5FF;#7C3AED;#00E5FF" dur="6s" repeatCount="indefinite"/>
</stop>
<stop offset="100%" stop-color="#FF4ECD"/>
</linearGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="3" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<rect width="128" height="128" rx="24" fill="#0B1020"/>

<g filter="url(#glow)">
<rect x="28" y="28" width="72" height="72" rx="10"
fill="#121A33"
stroke="url(#chip)"
stroke-width="3">
<animate attributeName="stroke-width" values="3;4;3" dur="2.5s" repeatCount="indefinite"/>
</rect>

<rect x="46" y="46" width="36" height="36" rx="4"
fill="none"
stroke="url(#chip)"
stroke-width="2"/>

<path d="M64 46V82M46 64H82"
stroke="url(#chip)"
stroke-width="2"/>

<g stroke="url(#chip)" stroke-width="2" stroke-linecap="round">
<line x1="18" y1="40" x2="28" y2="40"/>
<line x1="18" y1="56" x2="28" y2="56"/>
<line x1="18" y1="72" x2="28" y2="72"/>
<line x1="18" y1="88" x2="28" y2="88"/>

<line x1="100" y1="40" x2="110" y2="40"/>
<line x1="100" y1="56" x2="110" y2="56"/>
<line x1="100" y1="72" x2="110" y2="72"/>
<line x1="100" y1="88" x2="110" y2="88"/>

<line x1="40" y1="18" x2="40" y2="28"/>
<line x1="56" y1="18" x2="56" y2="28"/>
<line x1="72" y1="18" x2="72" y2="28"/>
<line x1="88" y1="18" x2="88" y2="28"/>

<line x1="40" y1="100" x2="40" y2="110"/>
<line x1="56" y1="100" x2="56" y2="110"/>
<line x1="72" y1="100" x2="72" y2="110"/>
<line x1="88" y1="100" x2="88" y2="110"/>
</g>
</g>

<circle cx="64" cy="64" r="3" fill="#00E5FF">
<animate attributeName="r" values="2;5;2" dur="2s" repeatCount="indefinite"/>
</circle>
</svg>
