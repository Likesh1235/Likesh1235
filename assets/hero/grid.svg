<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 500">
<defs>
  <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0H0V40" fill="none" stroke="#00E5FF" stroke-opacity="0.08" stroke-width="1"/>
  </pattern>

  <pattern id="largeGrid" width="200" height="200" patternUnits="userSpaceOnUse">
    <rect width="200" height="200" fill="url(#smallGrid)"/>
    <path d="M200 0H0V200" fill="none" stroke="#7C3AED" stroke-opacity="0.18" stroke-width="2"/>
  </pattern>

  <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.15"/>
  </linearGradient>

  <filter id="glow">
    <feGaussianBlur stdDeviation="2"/>
  </filter>
</defs>

<rect width="1600" height="500" fill="transparent"/>
<rect width="1600" height="500" fill="url(#largeGrid)">
  <animateTransform
    attributeName="transform"
    type="translate"
    values="0 0;40 40;0 0"
    dur="18s"
    repeatCount="indefinite"/>
</rect>

<g filter="url(#glow)">
  <line x1="0" y1="0" x2="1600" y2="500" stroke="url(#fade)" stroke-width="2" opacity="0.25"/>
  <line x1="1600" y1="0" x2="0" y2="500" stroke="url(#fade)" stroke-width="2" opacity="0.25"/>
</g>

<g fill="#00E5FF">
  <circle cx="300" cy="150" r="3">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="250" r="4">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1300" cy="340" r="3">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>
</g>
</svg>
