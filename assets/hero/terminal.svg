<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0B1020"/>
<stop offset="100%" stop-color="#151A2F"/>
</linearGradient>
<linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#00E5FF"/>
<stop offset="100%" stop-color="#7C3AED"/>
</linearGradient>
<filter id="shadow">
<feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
</filter>
<style>
.title{font:700 18px 'JetBrains Mono',Consolas,monospace;fill:#E5E7EB}
.cmd{font:600 24px 'JetBrains Mono',Consolas,monospace;fill:#00E5FF}
.out{font:22px 'JetBrains Mono',Consolas,monospace;fill:#E5E7EB}
.dim{fill:#9CA3AF}
</style>
</defs>

<rect width="1200" height="700" fill="url(#bg)"/>

<rect x="90" y="70" width="1020" height="560" rx="22" fill="#0F172A" filter="url(#shadow)" stroke="#2E3A59"/>

<rect x="90" y="70" width="1020" height="52" rx="22" fill="url(#header)"/>
<circle cx="125" cy="96" r="8" fill="#FF5F57"/>
<circle cx="150" cy="96" r="8" fill="#FEBC2E"/>
<circle cx="175" cy="96" r="8" fill="#28C840"/>

<text x="600" y="101" text-anchor="middle" class="title">likesh@ai:~</text>

<text x="130" y="170" class="cmd">$ whoami</text>
<text x="170" y="205" class="out">Likesh Kanna</text>

<text x="130" y="255" class="cmd">$ role</text>
<text x="170" y="290" class="out">Applied AI Engineer</text>

<text x="130" y="340" class="cmd">$ education</text>
<text x="170" y="375" class="out">B.Tech CSE (AI &amp; ML)</text>
<text x="170" y="405" class="out dim">SRM Institute of Science and Technology</text>

<text x="130" y="460" class="cmd">$ tech-stack</text>
<text x="170" y="495" class="out">Python • Java • Spring Boot</text>
<text x="170" y="525" class="out">LLMs • AI Engineering</text>

<text x="130" y="575" class="cmd">$ mission</text>
<text x="170" y="610" class="out">Building Intelligent AI Systems</text>

<rect x="170" y="622" width="12" height="24" fill="#00E5FF">
<animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
</rect>

</svg>
