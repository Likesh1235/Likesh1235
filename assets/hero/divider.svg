<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 120">
<defs>
<linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#00E5FF">
<animate attributeName="stop-color" values="#00E5FF;#7C3AED;#00E5FF" dur="8s" repeatCount="indefinite"/>
</stop>
<stop offset="100%" stop-color="#FF4ECD"/>
</linearGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="4" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>

<rect width="1600" height="120" fill="transparent"/>

<g filter="url(#glow)">
<path d="M80 60 H1520" stroke="url(#line)" stroke-width="3" stroke-linecap="round">
<animate attributeName="stroke-dasharray" values="0,1600;1600,0;0,1600" dur="6s" repeatCount="indefinite"/>
</path>
</g>

<g fill="#00E5FF">
<circle cx="320" cy="60" r="5">
<animate attributeName="r" values="4;8;4" dur="2.5s" repeatCount="indefinite"/>
</circle>
<circle cx="800" cy="60" r="7">
<animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
</circle>
<circle cx="1280" cy="60" r="5">
<animate attributeName="r" values="4;8;4" dur="2.8s" repeatCount="indefinite"/>
</circle>
</g>

<g opacity="0.45" stroke="#7C3AED" stroke-width="1.5">
<line x1="320" y1="60" x2="800" y2="60"/>
<line x1="800" y1="60" x2="1280" y2="60"/>
</g>

<text x="800" y="48" text-anchor="middle"
font-family="Segoe UI,Arial,sans-serif"
font-size="14"
fill="#9CA3AF"
letter-spacing="4">
AI • ENGINEERING • INNOVATION
</text>

</svg>
